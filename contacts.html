<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to continue • E-commerce</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
      background: #f9f9f9;
    }
    h1 {
      font-size: 28px;
      color: blue;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      margin-bottom: 40px;
      font-size: 17px;
    }
    .section {
      margin-bottom: 40px;
    }
    h2 {
      font-size: 22px;
      color: #222;
      margin-bottom: 15px;
    }
    .option {
      display: block;
      width: 300px;
      margin: 12px auto;
      padding: 16px;
      background-color: gold;
      color: white;
      border: none;
      border-radius: 17px;
      text-decoration: none;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option:hover {
      background-color: #e6b800;
      transform: translateY(-3px);
    }
    .back {
      color: blue;
      text-decoration: underline;
      margin-top: 30px;
      display: inline-block;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>You don't have an account</h1>
  <p>To add this item to your cart, please log in or sign up below.</p>

  <!-- LOGIN SECTION -->
  <div class="section">
    <h2>Log In</h2>
    <a href="#" class="option">📧 Log in with Email</a>
    <a href="#" class="option">📱 Log in with Phone Number</a>
    <a href="#" class="option">🔵 Log in with Google</a>
  </div>

  <!-- SIGN UP SECTION -->
  <div class="section">
    <h2>Sign Up</h2>
    <a href="#" class="option">📧 Sign up with Email</a>
    <a href="#" class="option">📱 Sign up with Phone Number</a>
    <a href="#" class="option">🔵 Sign up with Google</a>
  </div>

  <a href="index.html" class="back">← Back to product page</a>

</body>
</html>
